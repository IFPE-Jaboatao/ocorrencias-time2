name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint + testes
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_pass
          MYSQL_DATABASE: radaracademico_test
          MYSQL_USER: radar_user
          MYSQL_PASSWORD: radar_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Rodar migrations (teste)
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: radaracademico_test
          DB_USER: radar_user
          DB_PASS: radar_pass
          NODE_ENV: test
        run: npm run migration:run

      - name: Testes unitários
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: radaracademico_test
          DB_USER: radar_user
          DB_PASS: radar_pass
          JWT_SECRET: ci_test_secret_nao_usar_em_producao
          NODE_ENV: test
        run: npm test -- --passWithNoTests

      - name: Cobertura de testes
        if: github.ref == 'refs/heads/main'
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: radaracademico_test
          DB_USER: radar_user
          DB_PASS: radar_pass
          JWT_SECRET: ci_test_secret_nao_usar_em_producao
          NODE_ENV: test
        run: npm run test:cov -- --passWithNoTests

  frontend:
    name: Frontend — lint + testes
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test -- --passWithNoTests

      - name: Build de verificação
        run: npm run build
